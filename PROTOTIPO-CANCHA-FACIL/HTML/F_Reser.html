<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Reservas</title>
    <link rel="stylesheet" type="text/css" href="../CSS/F_Reserva.css">
</head>
<body>
    <div class="form"> 
        <h1 class="title">Reservas</h1> 

        <div class="text"> 
            <form>
                <div class="logo-container">
                    <img src="../imagenes/logo-green.png" width="100" height="100" alt="Logo CanchaFácil">
                </div>
                
                <div class="input-group">
                    <label>Nombre:</label>
                    <input type="text" name="nombre" required>
                </div>

                <div class="input-group">
                    <label>Apellido:</label>
                    <input type="text" name="apellido" required>
                </div>

                <div class="input-group">
                    <label>Correo:</label>
                    <input type="email" name="correo" required>
                </div>

                <div class="input-group">
                    <label>Teléfono:</label>
                    <input type="tel" name="telefono" required>
                </div>

                <div class="input-group">
                    <label>Sede:</label>
                    <select id="sede" name="sede">
                        <option value="don-balon">Don Balón</option>
                        <option value="leon-juda">Leon de Juda</option>
                        <option value="revancha">Club Dep. La Revancha</option>
                        <option value="rabona">Club Dep. La Rabona</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Tipo de Cancha:</label>
                    <select name="tipo_cancha">
                        <option value="5">Fútbol 5</option>
                        <option value="7">Fútbol 7</option>
                        <option value="9">Fútbol 9</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Fecha de reserva:</label>
                    <input type="datetime-local" name="fecha_reserva" required>
                </div>
                <a href="pasarela.html" class="btn-verde">Ir a Pagar </a> 
                <div class="actions">
                    <a href="catalogo.html" class="link-volver">Volver</a>
                </div>
            </form>
        </div>
    </div>
    
</body>
</html>>
